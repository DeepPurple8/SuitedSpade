<!DOCTYPE html>

    <title>Eat, Move, & Happy</title>
    <style>
        /* Basic Reset */
        * {
            margin: 10;
            padding: 10;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: tomato;
            color: #fff;
            padding: 1rem;
            text-align: center;
            }

        nav {
            background: #005fa3;
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 0.5rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background 0.3s;
        }

        nav a:hover {
            background: #004a80;
        }

        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 1rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 1rem;
            display: inline-block;
        }
        h2 {
            background: rgb(84, 219, 71);
            font-family: Segoe Script, Arial, Helvetica, sans-serif;
            margin-bottom: 1rem;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .inctr {
            padding: 1rem;
            display: inline-block;
            gap: 30px;
        }

        .column {
            float: left;
            width: 33.33%;
            padding: 5px;
        }

        /* Clearfix (clear floats) */
        .row::after {
            content: "";
            clear: both;
            display: table;
        }


        footer {
            text-align: center;
            padding: 1rem;
            background: #0077cc;
            color: #fff;
            margin-top: 2rem;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            nav {
                flex-direction: column;
            }
        }
    </style>
</head>
